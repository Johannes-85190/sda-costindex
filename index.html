<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SDA-COSTINDEX</title>

<meta name="apple-mobile-web-app-capable" content="yes">

</head>
<style>
<style>

/* ===== GLOBAL FIX ===== */
* {
  box-sizing: border-box;
}

body { font-family: Arial; background:#f2f4f7; margin:0; }
.container { padding:15px; max-width:500px; margin:auto; }

h2 {
  text-align: center;
  margin-top: 8px;   /* 🔥 réduit l’espace au-dessus */
  margin-bottom: 12px;
}
.card {
  background:white;
  border-radius:12px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

/* ===== ROW ===== */
.row {
  display: flex;
  gap: 12px; 
}

/* ===== ALIGNEMENT PRIX / COUT ===== */
.field {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
}

.field label {
  font-size:13px;
}

.field input {
  width:100%;
  height:40px;
}

/* ===== INPUT GLOBAL ===== */
input, select {
  width: 100%;
  padding: 8px;
  margin: 0;
}

/* ===== LIGNE COMPACTE ===== */
.ligne-compacte {
  display: flex;
  gap: 8px;
  align-items: center; /* 🔥 on revient à center */
}
.ligne-compacte select { flex:0.9; }
.ligne-compacte .tdv { flex:0.8; }
.ligne-compacte .conso { flex:1.2; }

.ligne-compacte .supprimer {
  flex:0 0 40px;
  padding:6px;
  height:40px;
}

.ligne-compacte input,
.ligne-compacte select {
  height:40px;
  padding:4px 8px;
  font-size:13px;
  margin:0;
}

/* ===== BUTTON ===== */
button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  font-size:16px;
}

.add { background:#3498db; color:white; }
.calc { background:#2ecc71; color:white; }
.supprimer {
  flex: 0 0 44px;
  height: 38px;
  border-radius: 10px;
  
  display: flex;
  align-items: center;
  justify-content: center;

  padding: 0;
  
  position: relative;
  top: -1px; /* 🔥 micro ajustement parfait */
}

/* ===== RESULT ===== */
.result-item {
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  background:#fafafa;
}

.meilleur {
  background:#d4edda;
  font-weight:bold;
}

.details {
  font-size:13px;
  color:#555;
}
.field input {
  height: 34px; /* réduit la hauteur */
}

.field {
  min-width: 0; /* évite que les champs se touchent */
}
.container {
  margin-top: 10px;
}  
  /* ===== ESPACEMENT GLOBAL PRO ===== */

/* espace entre les sections (cards) */
.card {
  margin-bottom: 16px;
}

/* espace entre Prix/Coût et les lignes FL */
#container {
  margin-top: 12px;
}

/* espace entre les lignes FL */
#container .card {
  margin-bottom: 12px;
}

/* espace entre les labels et les champs */
label {
  display: block;
  margin-bottom: 4px;
}

/* espace entre groupes (AVION / MODE / etc) */
.card > label {
  margin-top: 8px;
}

/* espace boutons */
button {
  margin-top: 12px;
}

/* espace entre boutons */
.add {
  margin-top: 16px;
}

/* centrage visuel général */
.container {
  padding: 16px;
}
  /* ===== FIX GLOBAL ===== */
* {
  box-sizing: border-box;
}

/* ===== INPUTS / SELECT UNIFORMES ===== */
input, select {
  width: 100%;
  height: 38px;              /* 🔥 hauteur uniforme */
  padding: 6px 10px;
  border-radius: 10px;       /* 🔥 arrondi */
  border: 1px solid #ccc;
  margin: 0;
}

/* ===== LIGNE FL (harmonisation hauteur) ===== */
.ligne-compacte input,
.ligne-compacte select {
  height: 38px;              /* 🔥 même hauteur partout */
}

/* ===== ALIGNEMENT PRIX / COUT ===== */
.row {
  display: flex;
  gap: 14px;                 /* 🔥 espace entre prix et coût */
}

/* ===== STRUCTURE DES CHAMPS ===== */
.field {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
}

/* ===== ESPACE ENTRE MODE ET PRIX ===== */
.card > .row {
  margin-top: 8px;
}

/* ===== ESPACE ENTRE LABEL ET INPUT ===== */
label {
  display: block;
  margin-bottom: 4px;
  font-size: 14px;
}

/* ===== ALIGNEMENT PARFAIT DROITE ===== */
.field input {
  width: 100%;
}

/* ===== CARDS ===== */
.card {
  padding: 16px;
  border-radius: 16px;
}
</style>
</style>
</head>

<body>
<div class="container">

<h2>✈️ SDA-COSTINDEX</h2>

<div class="card">
<label>AVION</label>
<select id="avion" onchange="majCoutMinute()">
  <option value="E55P">E55P</option>
  <option value="C525">C525</option>
</select>

<label>Mode</label>
<select id="modeCalcul">
  <option value="TP">TP </option>
  <option value="GIE">GIE </option>
</select>

<div class="row">
  <div class="field">
    <label>Prix carburant (€/L)</label>
    <input id="prix" type="number" step="0.01" value="1">
  </div>
  
  <div class="field">
    <label>Coût (€/minute)</label>
    <input id="minute" type="number">
  </div>
</div>

<div id="container"></div>

<button class="add" onclick="ajouterLigne()">➕ Ajouter une ligne</button>
<button class="calc" onclick="calculer()">Calculer</button>

<div id="result"></div>

</div>

<script>

// FL options
function genererOptionsFL(){
  let o=`<option value="">FL</option>`;
  for(let i=180;i<=450;i+=10){
    o+=`<option value="${i}">${i}</option>`;
  }
  return o;
}

// unité conso
function getUniteConso(){
  return avion.value==="E55P" ? "KG" : "LBS";
}

// ajouter ligne
function ajouterLigne(){
  let d=document.createElement("div");
  d.className="card";

  d.innerHTML = `
  <div class="row ligne-compacte">
    <select class="nom">${genererOptionsFL()}</select>
    <input class="tdv" type="number" placeholder="TDV (min)">
    <input class="conso" type="number" placeholder="CONSO (${getUniteConso()})">
    <button class="supprimer" onclick="this.parentElement.remove()">🗑</button>
  </div>
`;

  container.appendChild(d);
}

// MAJ avion
function majCoutMinute(){
  minute.value = avion.value==="E55P" ? 48 : 35;

  document.querySelectorAll(".conso").forEach(i=>{
    i.placeholder = `CONSO (${getUniteConso()})`;
  });
}

// calcul
function calculer(){

  let prix=parseFloat(prixInput.value)||0;
  let minute=parseFloat(minuteInput.value)||0;
  let mode=modeCalcul.value;

  let noms=document.querySelectorAll(".nom");
  let tdvs=document.querySelectorAll(".tdv");
  let consos=document.querySelectorAll(".conso");

  let res=[];

  for(let i=0;i<noms.length;i++){

    let nom=noms[i].value ? `FL${noms[i].value}` : "FL ?";
    let tdv=parseFloat(tdvs[i].value)||0;
    let conso=parseFloat(consos[i].value)||0;

    // conversion litres
    let consoL = avion.value==="E55P"
      ? conso/0.79
      : (conso*0.453592)/0.79;

    let coutTemps = tdv * minute;
    let coutCarb = consoL * prix;
    let total = coutTemps + coutCarb;

    let score;
    let poids = 0.5;

    if(mode==="TP"){
      score = total;
    } else {
      score = consoL + (poids * tdv);
    }

    res.push({
      nom,
      total,
      coutTemps,
      coutCarb,
      consoL,
      score
    });
  }

  let min=Math.min(...res.map(r=>r.score));

  let html = `<div class="card"><strong>${avion.value} — Mode ${mode}</strong></div>`;

  res.forEach(r=>{
    let cls = r.score===min ? "result-item meilleur" : "result-item";

    html+=`
      <div class="${cls}">
        ${r.nom} : ${r.total.toFixed(2)} €
        <div class="details">
          ⏱ ${r.coutTemps.toFixed(1)} € |
          ⛽ ${r.coutCarb.toFixed(1)} € 
        </div>
      </div>
    `;
  });

  result.innerHTML = html;
}

// refs
let prixInput=document.getElementById("prix");
let minuteInput=document.getElementById("minute");
let avion=document.getElementById("avion");
let modeCalcul=document.getElementById("modeCalcul");
let container=document.getElementById("container");
let result=document.getElementById("result");

// init
ajouterLigne();
ajouterLigne();
majCoutMinute();

</script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js")
    .then(() => console.log("SW OK"))
    .catch(err => console.log("SW erreur", err));
}
</script>
</body>
</html>
